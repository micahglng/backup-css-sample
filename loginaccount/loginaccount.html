<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-In Account</title>
    <link rel="stylesheet" href="style3.css/account.css">

</head>
<body> 
    <div class="container">
        <h2 class="title">Create Account</h2>
        <form action="">
            <input type="text" class="input_field" name="" id="username" placeholder="Your Name">
            <input type="text" class="input_field" name="" id="email" placeholder="Your Email">
            <input type="password" class="input_field" id="" placeholder="Password">
             <input type="password" class="input_field" id="" placeholder="Repeat Your Password">
             <input type="checkbox" class="checkbox" id="checkbox">
             <label for="checkbox">I agree to the terms and conditions</label><br>
            <button type="submit" class="btn">SIGN UP</button><br><br><br><br>
            <p>Have already an account? <u>Login here</u></p>
        </form>
    </div>
    
</body>
</html>
